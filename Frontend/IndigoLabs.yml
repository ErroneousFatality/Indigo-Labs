opencollection: 1.0.0
info:
  name: IndigoLabs
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ''
      port: ''
      auth:
        username: ''
        password: ''
      bypassProxy: ''
items:
  - info:
      name: Cities
      type: folder
      seq: 1
    request:
      auth: inherit
    items:
      - info:
          name: Get all
          type: http
          seq: 2
        http:
          method: GET
          url: http://localhost:8080/Cities
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Get averages
          type: http
          seq: 4
        http:
          method: GET
          url: http://localhost:8080/Cities/Averages?Min=-5&Max=21
          params:
            - name: Min
              value: '-5'
              type: query
            - name: Max
              value: '21'
              type: query
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Get single
          type: http
          seq: 3
        http:
          method: GET
          url: http://localhost:8080/Cities/:name
          params:
            - name: name
              value: ljubljana
              type: path
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Reload data
          type: http
          seq: 1
        http:
          method: POST
          url: http://localhost:8080/Cities/ReloadData
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
bundled: true
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    exportedAt: '2026-05-17T10:33:02.779Z'
    exportedUsing: Bruno
